<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hossein AI Job Assistant</title>

  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: Arial;
      background: linear-gradient(to bottom right, #0f172a, #1e3a5f);
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    textarea {
      width: 100%;
      height: 220px;
      border: none;
      border-radius: 15px;
      padding: 20px;
      font-size: 16px;
      resize: none;
      outline: none;
    }

    button {
      margin-top: 20px;
      padding: 15px 25px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.03);
    }

    .progress-bar {
      width: 100%;
      height: 25px;
      background: #1e293b;
      border-radius: 15px;
      overflow: hidden;
      margin-top: 25px;
    }

    #barFill {
      width: 0%;
      height: 100%;
      background: #22c55e;
      transition: 0.6s;
      border-radius: 15px;
    }

    #output {
      margin-top: 30px;
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 20px;
      white-space: pre-wrap;
      line-height: 1.8;
      backdrop-filter: blur(10px);
    }

    .reset-btn {
      background: #ef4444;
      margin-left: 10px;
    }

    .reset-btn:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Hossein AI Job Assistant</h1>

    <h3>Paste Job Description:</h3>

    <textarea id="job"></textarea>

    <br>

    <button onclick="generate()">
      Generate ATS Suggestions
    </button>

    <button class="reset-btn" onclick="resetAll()">
      Reset
    </button>

    <div class="progress-bar">
      <div id="barFill"></div>
    </div>

    <div id="output"></div>

  </div>

  <script>

    function generate() {

      const job = document.getElementById("job").value.toLowerCase();

      let keywords = [];
      let score = 0;

      if (job.includes("python")) {
        keywords.push("Python");
        score += 25;
      }

      if (job.includes("sql")) {
        keywords.push("SQL");
        score += 25;
      }

      if (job.includes("excel")) {
        keywords.push("Excel");
        score += 25;
      }

      if (job.includes("javascript")) {
        keywords.push("JavaScript");
        score += 25;
      }

      const result = `
ATS Score: ${score}%

Suggested Keywords:

${keywords.map(k => "- " + k).join("\n")}

Generated Cover Letter:

Dear Hiring Manager,

I am excited to apply for this role.

My background in technology, problem-solving, and fast learning makes me a strong candidate.

I am especially interested in:

${job.substring(0, 200)}

Best regards,
Hossein
`;

      document.getElementById("output").innerText = result;

      document.getElementById("barFill").style.width = score + "%";

      if (score < 50) {
        document.getElementById("barFill").style.background = "#ef4444";
      }

      else if (score < 80) {
        document.getElementById("barFill").style.background = "#f59e0b";
      }

      else {
        document.getElementById("barFill").style.background = "#22c55e";
      }

    }

    function resetAll() {

      document.getElementById("job").value = "";

      document.getElementById("output").innerText = "";

      document.getElementById("barFill").style.width = "0%";
    }

  </script>

</body>

</html>
