<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hossein AI Job Assistant</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

textarea{
    width:100%;
    height:250px;
    border:none;
    border-radius:15px;
    padding:20px;
    font-size:16px;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#result{
    margin-top:30px;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    white-space:pre-wrap;
    line-height:1.7;
}

</style>

</head>

<body>

<div class="container">

<h1>AI ATS Resume Match Analyzer</h1>

<form id="jobForm">

<textarea
name="job_description"
placeholder="Paste Job Description Here..."
></textarea>

<button type="submit">
Analyze Resume Match
</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("jobForm").addEventListener("submit", async function(e){

    e.preventDefault();

    let formData = new FormData(this);

    document.getElementById("result").innerText = "Analyzing Resume...";

    let response = await fetch("/generate", {
        method:"POST",
        body:formData
    });

    let data = await response.text();

    document.getElementById("result").innerText = data;

});

</script>

</body>
</html>
